<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
    text-align: center;
}

header {
    background: #222;
    color: white;
    padding: 20px;
    animation: fadeIn 2s;
}

section {
    padding: 20px;
}

.box {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    animation: slideUp 1s;
}

input, button {
    padding: 10px;
    margin: 5px;
}

button {
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #555;
}

/* Animations */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes slideUp {
    from {transform:translateY(50px); opacity:0;}
    to {transform:translateY(0); opacity:1;}
}
</style>

</head>
<body>

<header>
<h1>Abdul Rahman</h1>
<p>Student | Web Developer</p>
</header>

<section>

<div class="box">
<h2>🎓 Result System</h2>
<input type="number" id="m1" placeholder="Subject 1">
<input type="number" id="m2" placeholder="Subject 2">
<input type="number" id="m3" placeholder="Subject 3">
<br>
<button onclick="calculateResult()">Check Result</button>
<p id="result"></p>
</div>

<div class="box">
<h2>🧮 Calculator</h2>
<input type="number" id="num1" placeholder="Number 1">
<input type="number" id="num2" placeholder="Number 2">
<br>
<button onclick="add()">+</button>
<button onclick="sub()">-</button>
<button onclick="mul()">×</button>
<button onclick="div()">÷</button>
<p id="calcResult"></p>
</div>

</section>

<script>

// Result System
function calculateResult() {
    let m1 = +document.getElementById("m1").value;
    let m2 = +document.getElementById("m2").value;
    let m3 = +document.getElementById("m3").value;

    let total = m1 + m2 + m3;
    let percent = total / 3;

    let grade = "";

    if (percent >= 80) grade = "A";
    else if (percent >= 60) grade = "B";
    else if (percent >= 40) grade = "C";
    else grade = "Fail";

    document.getElementById("result").innerHTML =
        "Percentage: " + percent + "% | Grade: " + grade;
}

// Calculator
function add() {
    let a = +num1.value;
    let b = +num2.value;
    calcResult.innerHTML = a + b;
}

function sub() {
    calcResult.innerHTML = num1.value - num2.value;
}

function mul() {
    calcResult.innerHTML = num1.value * num2.value;
}

function div() {
    calcResult.innerHTML = num1.value / num2.value;
}

</script>

</body>
</html>
